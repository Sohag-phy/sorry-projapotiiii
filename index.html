<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry Lamia 💛</title>
  <style>
    body {
      background: linear-gradient(to right, #ffd6e0, #ffe8cc);
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      font-size: 40px;
      color: #333;
    }
    p {
      font-size: 18px;
      color: #555;
      max-width: 400px;
      margin: auto;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background-color: #ff6b81;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
    }
    #hiddenMessage {
      display: none;
      margin-top: 20px;
      color: #444;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Sorry, Lamia 💛</h1>

  <p>
    I didn’t think about your class time properly…  
    I know you don’t like being disturbed then.
  </p>

  <button onclick="showMessage()">Click me 🙂</button>

  <div id="hiddenMessage">
    I’ll be more careful next time.  
    Your space matters to me.
  </div>

  <script>
    function showMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }
  </script>

</body>
</html>
